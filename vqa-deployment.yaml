apiVersion: apps/v1
kind: Deployment
metadata:
  name: on-race-vqa
  namespace: t6-on-race-prod
spec:
  replicas: 2  # 서버 2대를 띄워 부하 분산
  selector:
    matchLabels:
      app: on-race-vqa
  template:
    metadata:
      labels:
        app: on-race-vqa
    spec:
      serviceAccountName: ai-service-account  # S3 접근을 위한 지문 인식 설정
      # nodeSelector:
      #   workload: vqa                         # VQA 전용 서버 사양 사용
      # tolerations:
      # - key: "workload"
      #   operator: "Equal"
      #   value: "vqa"
      #   effect: "NoSchedule"
      containers:
      - name: vqa-api
        image: 274130523831.dkr.ecr.ap-northeast-2.amazonaws.com/on-race-vqa:latest
        ports:
        - containerPort: 8000
        env:
        # DB 접속 정보 (여기에 실제 비밀번호를 넣으세요)
        - name: DB_ENDPOINT
          value: "t6-on-race-db.cezs44cv5c1v.ap-northeast-2.rds.amazonaws.com"
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "onrace"
        - name: DB_USERNAME
          value: "admin"
        - name: DB_PASSWORD
          value: "t6-on-race-db-pw"
        # S3 정보
        - name: S3_BUCKET_NAME
          value: "t6-on-race-ai-vqa-data-prod"
        - name: AWS_REGION
          value: "ap-northeast-2"
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: on-race-vqa-svc
  namespace: t6-on-race-prod
spec:
  selector:
    app: on-race-vqa
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP